<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kindle capture region example</title>
  <desc id="desc">A Kindle-like desktop window with a green dashed rectangle around the book text area. Labels explain the x, y, width, and height values used by the --region option.</desc>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0F172A">キャプチャ範囲 --region の考え方</text>
  <text x="52" y="92" font-family="Arial, sans-serif" font-size="16" fill="#475569">本文だけを切り取ると、OCR精度が上がり、余白やメニューを減らせます</text>

  <rect x="100" y="135" width="760" height="500" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="4"/>
  <rect x="100" y="135" width="760" height="52" rx="18" fill="#E2E8F0"/>
  <circle cx="132" cy="161" r="8" fill="#EF4444"/>
  <circle cx="160" cy="161" r="8" fill="#F59E0B"/>
  <circle cx="188" cy="161" r="8" fill="#22C55E"/>
  <text x="225" y="167" font-family="Arial, sans-serif" font-size="16" fill="#334155">Kindle for PC window</text>

  <rect x="180" y="220" width="570" height="360" rx="8" fill="#FFFBEB" stroke="#94A3B8"/>
  <line x1="230" y1="280" x2="690" y2="280" stroke="#475569" stroke-width="5"/>
  <line x1="230" y1="320" x2="690" y2="320" stroke="#475569" stroke-width="5"/>
  <line x1="230" y1="360" x2="690" y2="360" stroke="#475569" stroke-width="5"/>
  <line x1="230" y1="400" x2="690" y2="400" stroke="#475569" stroke-width="5"/>
  <line x1="230" y1="440" x2="620" y2="440" stroke="#475569" stroke-width="5"/>
  <line x1="230" y1="480" x2="650" y2="480" stroke="#475569" stroke-width="5"/>
  <rect x="205" y="245" width="515" height="265" rx="8" fill="none" stroke="#16A34A" stroke-width="6" stroke-dasharray="14 10"/>

  <path d="M205 245H115" stroke="#16A34A" stroke-width="4" stroke-linecap="round"/>
  <path d="M205 245V198" stroke="#16A34A" stroke-width="4" stroke-linecap="round"/>
  <text x="112" y="230" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">x=205</text>
  <text x="216" y="207" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">y=245</text>

  <path d="M205 532H720" stroke="#16A34A" stroke-width="4" stroke-linecap="round"/>
  <text x="384" y="560" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">width=515</text>
  <path d="M746 245V510" stroke="#16A34A" stroke-width="4" stroke-linecap="round"/>
  <text x="762" y="386" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">height=265</text>

  <rect x="910" y="168" width="300" height="400" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
  <text x="940" y="215" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0F172A">指定例</text>
  <rect x="940" y="244" width="230" height="54" rx="8" fill="#ECFDF5"/>
  <text x="958" y="278" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">--region 205,245,515,265</text>
  <text x="940" y="334" font-family="Arial, sans-serif" font-size="16" fill="#475569">形式は次の順番です。</text>
  <text x="940" y="370" font-family="Arial, sans-serif" font-size="18" fill="#0F172A">x, y, width, height</text>
  <text x="940" y="420" font-family="Arial, sans-serif" font-size="16" fill="#475569">最初は全画面でテストし、</text>
  <text x="940" y="448" font-family="Arial, sans-serif" font-size="16" fill="#475569">余白が気になったら本文部分</text>
  <text x="940" y="476" font-family="Arial, sans-serif" font-size="16" fill="#475569">だけに絞ります。</text>
</svg>
