<svg width="1280" height="620" viewBox="0 0 1280 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kindle OCR output concept</title>
  <desc id="desc">An illustration showing captured page images converted into a PDF with an invisible OCR text layer, owner label, and QR code metadata.</desc>
  <rect width="1280" height="620" fill="#F8FAFC"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0F172A">OCR付きPDFの中身</text>
  <text x="52" y="92" font-family="Arial, sans-serif" font-size="16" fill="#475569">見た目は画像、裏側に透明テキストが入るのでAIや検索で扱いやすくなります</text>

  <g transform="translate(90 150)">
    <rect x="0" y="0" width="260" height="360" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="38" y="52" width="184" height="236" rx="6" fill="#FEF3C7" stroke="#D97706"/>
    <line x1="62" y1="98" x2="198" y2="98" stroke="#475569" stroke-width="4"/>
    <line x1="62" y1="132" x2="198" y2="132" stroke="#475569" stroke-width="4"/>
    <line x1="62" y1="166" x2="176" y2="166" stroke="#475569" stroke-width="4"/>
    <line x1="62" y1="200" x2="198" y2="200" stroke="#475569" stroke-width="4"/>
    <text x="52" y="330" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">キャプチャ画像</text>
  </g>

  <path d="M390 330H500" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <path d="M482 310L504 330L482 350" stroke="#2563EB" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(550 120)">
    <rect x="0" y="0" width="330" height="430" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="48" y="42" width="234" height="300" rx="7" fill="#FFFBEB" stroke="#94A3B8"/>
    <line x1="78" y1="92" x2="250" y2="92" stroke="#475569" stroke-width="4"/>
    <line x1="78" y1="126" x2="250" y2="126" stroke="#475569" stroke-width="4"/>
    <line x1="78" y1="160" x2="220" y2="160" stroke="#475569" stroke-width="4"/>
    <line x1="78" y1="194" x2="250" y2="194" stroke="#475569" stroke-width="4"/>
    <rect x="72" y="82" width="190" height="126" rx="6" fill="none" stroke="#16A34A" stroke-width="4" stroke-dasharray="10 8" opacity="0.75"/>
    <text x="72" y="374" font-family="Arial, sans-serif" font-size="16" fill="#64748B">owner: private-use-only</text>
    <rect x="244" y="352" width="48" height="48" rx="4" fill="#E2E8F0" stroke="#64748B"/>
    <path d="M256 362H270V376H256V362ZM274 362H284V372H274V362ZM256 380H266V390H256V380ZM272 380H286V394H272V380Z" fill="#0F172A"/>
    <text x="75" y="405" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">PDF + 透明OCRテキスト</text>
  </g>

  <path d="M920 330H1030" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <path d="M1012 310L1034 330L1012 350" stroke="#2563EB" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1070 170)">
    <rect x="0" y="0" width="150" height="300" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <circle cx="75" cy="82" r="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/>
    <text x="48" y="93" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1D4ED8">AI</text>
    <text x="30" y="172" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">検索</text>
    <text x="30" y="204" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">要約</text>
    <text x="30" y="236" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">質問回答</text>
  </g>
</svg>
