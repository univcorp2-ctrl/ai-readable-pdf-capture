<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kindle click advance example</title>
  <desc id="desc">A Kindle-like window showing a blue click target on the right side page turn area. The --advance click:x,y command is shown as a fallback when keyboard page turning does not work.</desc>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0F172A">キーで進まない時の click:x,y</text>
  <text x="52" y="92" font-family="Arial, sans-serif" font-size="16" fill="#475569">右矢印キーやPageDownが効かない場合、ページ送りボタンの座標をクリック指定します</text>

  <rect x="90" y="140" width="820" height="500" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="4"/>
  <rect x="90" y="140" width="820" height="52" rx="18" fill="#E2E8F0"/>
  <text x="130" y="172" font-family="Arial, sans-serif" font-size="16" fill="#334155">Kindle window</text>
  <rect x="190" y="230" width="560" height="350" rx="8" fill="#FFFBEB" stroke="#94A3B8"/>
  <line x1="250" y1="290" x2="690" y2="290" stroke="#475569" stroke-width="5"/>
  <line x1="250" y1="330" x2="690" y2="330" stroke="#475569" stroke-width="5"/>
  <line x1="250" y1="370" x2="690" y2="370" stroke="#475569" stroke-width="5"/>
  <line x1="250" y1="410" x2="650" y2="410" stroke="#475569" stroke-width="5"/>
  <line x1="250" y1="450" x2="680" y2="450" stroke="#475569" stroke-width="5"/>

  <rect x="768" y="310" width="92" height="170" rx="46" fill="#DBEAFE" stroke="#2563EB" stroke-width="4"/>
  <circle cx="814" cy="395" r="34" fill="#2563EB"/>
  <path d="M806 377L826 395L806 413" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M814 395C940 395 950 242 1010 242" stroke="#2563EB" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10"/>

  <rect x="970" y="172" width="260" height="250" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
  <text x="1000" y="220" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0F172A">指定例</text>
  <rect x="1000" y="250" width="190" height="54" rx="8" fill="#EFF6FF"/>
  <text x="1016" y="284" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1D4ED8">--advance click:814,395</text>
  <text x="1000" y="340" font-family="Arial, sans-serif" font-size="16" fill="#475569">x,y は画面上の</text>
  <text x="1000" y="368" font-family="Arial, sans-serif" font-size="16" fill="#475569">クリック位置です。</text>

  <rect x="970" y="454" width="260" height="122" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="1000" y="500" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412">コツ</text>
  <text x="1000" y="532" font-family="Arial, sans-serif" font-size="15" fill="#9A3412">Kindle右端にページ送り</text>
  <text x="1000" y="556" font-family="Arial, sans-serif" font-size="15" fill="#9A3412">矢印が出る位置を使います。</text>
</svg>
